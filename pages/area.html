<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ГҒrea вҖ” Apoyo ICFES</title>
  <link rel="stylesheet" href="../shared/css/variables.css">
  <link rel="stylesheet" href="../shared/css/base.css">
  <link rel="stylesheet" href="../shared/css/layout.css">
  <link rel="stylesheet" href="../shared/css/components.css">
  <link rel="stylesheet" href="../shared/css/backgrounds.css">
</head>
<body>

  <div class="bg-canvas" aria-hidden="true"></div>

  <header class="site-header">
    <div class="container">
      <a href="../index.html" style="text-decoration:none;">
        <h1 class="site-title">Apoyo ICFES</h1>
      </a>
      <p class="site-subtitle">Entiende el <em>por quГ©</em> de cada respuesta</p>
    </div>
  </header>

  <nav class="breadcrumb container" aria-label="NavegaciГіn">
    <a href="../index.html">Inicio</a>
    <span aria-hidden="true">вҖә</span>
    <span id="breadcrumb-area">ГҒrea</span>
  </nav>

  <main class="container" style="position:relative; z-index:1;">
    <section class="area-list">
      <h2 class="section-title" id="area-title">Preguntas</h2>
      <div class="question-list" id="question-list">
    <p class="text-gray-500">Cargando...</p>
  </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>Material de apoyo pedagГіgico вҖ” No oficial</p>
  </footer>

  <script src="../shared/js/questions.js"></script>
  <script>
    // Mapping de nombre de ГЎrea visible
    const AREA_NAMES = {
      mat: 'MatemГЎticas',
      lc: 'Lectura CrГӯtica',
      cn: 'Ciencias Naturales',
      cc: 'Competencias Ciudadanas',
      soc: 'Competencias Ciudadanas',
      en: 'InglГ©s'
    };
    
    // Mapping de ГЎreas URL -> subject del preguntas.js
    const AREA_SUBJECT = {
      mat: 'mat',
      lc: 'lc',
      cn: 'cn',
      cc: 'soc',
      soc: 'soc',
      en: 'ing'
    };
    
    // ГҚconos por ГЎrea
    const AREA_ICONS = {
      mat: ['вҲ‘', 'вҲ«', 'ПҖ', 'вҲҡ', 'вүҲ', 'О”', 'О©', 'О»', 'вҲһ'],
      lc: ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I'],
      cn: ['вҡӣ', 'рҹ§¬', 'рҹ”¬', 'рҹ§Ә', 'рҹҢҝ', 'вҡЎ', 'рҹ”Ҙ', 'рҹ’§', 'рҹҢҠ'],
      cc: ['вҡ–пёҸ', 'рҹӨқ', 'рҹ—іпёҸ', 'рҹ—ЈпёҸ', 'рҹ“ў', 'рҹ‘Ҙ', 'рҹ‘Ө', 'рҹҸӣпёҸ', 'рҹӣЎпёҸ'],
      en: ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I'],
      ing: ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I']
    };
    
    function truncate(str, len) {
      if (!str || str.length <= len) return str;
      return str.substring(0, len).trim() + '...';
    }
    
    function spawnBackgroundIcons(area) {
      const canvas = document.getElementById('heroBg');
      if (!canvas) return;
      canvas.innerHTML = '';
      const icons = AREA_ICONS[area] || AREA_ICONS.mat;
      for (let i = 0; i < 18; i++) {
        const el = document.createElement('div');
        el.className = 'hero-bg-item';
        el.textContent = icons[i % icons.length];
        el.style.cssText = 'top: ' + (Math.random() * 90 + 5) + '%; left: ' + (Math.random() * 90 + 5) + '%; font-size: ' + (35 + Math.random() * 55) + 'px; animation-delay: ' + (Math.random() * 5) + 's; animation-duration: ' + (12 + Math.random() * 12) + 's;';
        canvas.appendChild(el);
      }
    }
    
    // Obtener preguntas de un ГЎrea
    function getQuestionsByArea(area) {
      if (typeof PREGUNTAS === 'undefined') return [];
      return PREGUNTAS.filter(function(q) { return q.subject === area; });
    }
    
    // Inicializar
    (function() {
      // Debug
      if (typeof PREGUNTAS === 'undefined') {
        document.getElementById('question-list').innerHTML = '<p class="text-red-600">Error: PREGUNTAS no cargado</p>';
        return;
      }
      
      var params = new URLSearchParams(location.search);
      var areaUrl = params.get('area') || 'mat';
      var subject = AREA_SUBJECT[areaUrl] || areaUrl;
      
      document.body.dataset.area = areaUrl;
      document.getElementById('breadcrumb-area').textContent = AREA_NAMES[areaUrl] || areaUrl;
      document.getElementById('area-title').textContent = 'Preguntas de ' + (AREA_NAMES[areaUrl] || areaUrl);
      
      spawnBackgroundIcons(areaUrl);
      
      var data = getQuestionsByArea(subject);
      var list = document.getElementById('question-list');
      
      if (data.length === 0) {
        list.innerHTML = '<p class="text-soft">No hay preguntas para esta ГЎrea.</p>';
        return;
      }
      
      // Ordenar por ID
      data.sort(function(a, b) { return a.id - b.id; });
      
      data.forEach(function(q) {
        var item = document.createElement('a');
        item.href = 'justification.html?id=' + q.id + '&area=' + areaUrl;
        item.className = 'question-list-item';
        var qtext = q.text || 'Pregunta #' + q.id;
        item.innerHTML = '<span class="qli-id">#' + q.id + '</span><p class="qli-text">' + truncate(qtext, 80) + '</p><span class="qli-arrow">вҶ’</span>';
        list.appendChild(item);
      });
    })();
  </script>
</body>
</html>
